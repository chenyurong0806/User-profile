function safeTarget(raw, fallback) {
  try {
    const target = new URL(raw || fallback);

    if (
      target.protocol === 'http:' ||
      target.protocol === 'https:'
    ) {
      return target;
    }

    return new URL(fallback);
  } catch {
    return new URL(fallback);
  }
}

function loginUrl(from) {
  const target = safeTarget(from, LOGIN_PAGE);
  const login = new URL(LOGIN_PAGE);

  login.searchParams.set('from', target.toString());
  login.searchParams.set('site', target.hostname);
  login.searchParams.set(
    'icon',
    `${target.origin}/favicon.ico`
  );

  return login.toString();
}

async function readJson(request) {
  try {
    return await request.json();
  } catch {
    throw new Error('请求内容不是有效的 JSON');
  }
}

export default {
  async fetch(request, env, ctx) {
    const url = new URL(request.url);
    const currentDomain = getCookieDomain(url.hostname);

    /*
     * 登录站点的普通页面请求继续交给源站处理。
     * /api/ 开头的请求由当前 Worker 处理。
     */
    if (
      url.hostname === 'login.chenyurong.qzz.io' &&
      !url.pathname.startsWith('/api/')
    ) {
      return fetch(request);
    }

    /*
     * 1. 用户登录
     */
    if (
      url.pathname === '/api/login' &&
      request.method === 'POST'
    ) {
      try {
        const {
          username,
          password,
          remember = true
        } = await readJson(request);

        const cleanUsername = String(username || '').trim();
        const cleanPassword = String(password || '');

        if (!cleanUsername || !cleanPassword) {
          return json(
            {
              success: false,
              message: '请输入用户名和密码'
            },
            400
          );
        }

        const user = await env.DB.prepare(
          `
          SELECT username, nickname
          FROM users
          WHERE username = ? AND password = ?
          `
        )
          .bind(cleanUsername, cleanPassword)
          .first();

        if (!user) {
          return json(
            {
              success: false,
              message: '用户名或密码不正确'
            },
            401
          );
        }

        const token = crypto.randomUUID();
        const days = remember ? 30 : 1;
        const ttl = days * 24 * 60 * 60;

        await env.AUTH_DB.put(
          `session:${token}`,
          user.username,
          {
            expirationTtl: ttl
          }
        );

        const cookie =
          `auth_token=${encodeURIComponent(token)}; ` +
          `Path=/; ` +
          `Domain=${currentDomain}; ` +
          `Max-Age=${ttl}; ` +
          `HttpOnly; ` +
          `Secure; ` +
          `SameSite=Lax`;

        return json(
          {
            success: true,
            username: user.username,
            name: user.nickname || user.username
          },
          200,
          {
            'Set-Cookie': cookie
          }
        );
      } catch (error) {
        return json(
          {
            success: false,
            message: error.message || '登录失败'
          },
          500
        );
      }
    }

    /*
     * 2. 注册账号
     *
     * 需要在 Worker 环境变量中设置：
     * INVITE_CODE=你的邀请码
     */
    if (
      url.pathname === '/api/register' &&
      request.method === 'POST'
    ) {
      try {
        const {
          name,
          birthday,
          gender,
          username,
          password,
          invite_code
        } = await readJson(request);

        const cleanName = String(name || '').trim();
        const cleanBirthday = String(birthday || '').trim();
        const cleanGender = String(gender || '').trim();
        const cleanUsername = String(username || '').trim();
        const cleanPassword = String(password || '');
        const cleanInviteCode = String(invite_code || '');

        if (!cleanName) {
          return json(
            {
              success: false,
              message: '请输入姓名'
            },
            400
          );
        }

        if (
          !/^\d{4}-\d{2}-\d{2}$/.test(cleanBirthday)
        ) {
          return json(
            {
              success: false,
              message: '生日格式不正确'
            },
            400
          );
        }

        const birthdayDate = new Date(
          `${cleanBirthday}T00:00:00`
        );

        if (
          Number.isNaN(birthdayDate.getTime()) ||
          birthdayDate > new Date()
        ) {
          return json(
            {
              success: false,
              message: '请输入有效的生日'
            },
            400
          );
        }

        const allowedGenders = [
          'male',
          'female',
          'custom',
          'none'
        ];

        if (!allowedGenders.includes(cleanGender)) {
          return json(
            {
              success: false,
              message: '请选择性别'
            },
            400
          );
        }

        if (
          !/^[A-Za-z0-9._]{3,32}$/.test(cleanUsername)
        ) {
          return json(
            {
              success: false,
              message:
                '用户名需为 3–32 位字母、数字、下划线或句点'
            },
            400
          );
        }

        if (cleanPassword.length < 8) {
          return json(
            {
              success: false,
              message: '密码至少需要 8 个字符'
            },
            400
          );
        }

        if (
          !env.INVITE_CODE ||
          cleanInviteCode !== String(env.INVITE_CODE)
        ) {
          return json(
            {
              success: false,
              message: '邀请码不正确'
            },
            403
          );
        }

        const exists = await env.DB.prepare(
          `
          SELECT username
          FROM users
          WHERE username = ?
          `
        )
          .bind(cleanUsername)
          .first();

        if (exists) {
          return json(
            {
              success: false,
              message: '该用户名已被使用'
            },
            409
          );
        }

        await env.DB.prepare(
          `
          INSERT INTO users (
            username,
            password,
            nickname,
            birthday,
            gender,
            avatar,
            email,
            bio
          )
          VALUES (?, ?, ?, ?, ?, '', '', '')
          `
        )
          .bind(
            cleanUsername,
            cleanPassword,
            cleanName,
            cleanBirthday,
            cleanGender
          )
          .run();

        return json(
          {
            success: true,
            username: cleanUsername,
            name: cleanName
          },
          201
        );
      } catch (error) {
        return json(
          {
            success: false,
            message: `注册失败：${error.message}`
          },
          500
        );
      }
    }

    /*
     * 3. 忘记密码身份验证
     *
     * 前端发送：
     * {
     *   username: "用户名",
     *   name: "姓名"
     * }
     */
    if (
      url.pathname === '/api/password/verify' &&
      request.method === 'POST'
    ) {
      try {
        const {
          username,
          name
        } = await readJson(request);

        const cleanUsername = String(username || '').trim();
        const cleanName = String(name || '').trim();

        if (!cleanUsername || !cleanName) {
          return json(
            {
              success: false,
              message: '请输入用户名和姓名'
            },
            400
          );
        }

        const user = await env.DB.prepare(
          `
          SELECT username
          FROM users
          WHERE username = ? AND nickname = ?
          `
        )
          .bind(cleanUsername, cleanName)
          .first();

        if (!user) {
          return json(
            {
              success: false,
              message: '用户名与姓名不匹配'
            },
            404
          );
        }

        return json({
          success: true
        });
      } catch (error) {
        return json(
          {
            success: false,
            message: error.message || '验证失败'
          },
          500
        );
      }
    }

    /*
     * 4. 忘记密码后重置密码
     *
     * 前端发送：
     * {
     *   username: "用户名",
     *   name: "姓名",
     *   new_password: "新密码"
     * }
     */
    if (
      url.pathname === '/api/password/reset' &&
      request.method === 'POST'
    ) {
      try {
        const {
          username,
          name,
          new_password
        } = await readJson(request);

        const cleanUsername = String(username || '').trim();
        const cleanName = String(name || '').trim();
        const cleanPassword = String(new_password || '');

        if (!cleanUsername || !cleanName) {
          return json(
            {
              success: false,
              message: '身份信息不完整'
            },
            400
          );
        }

        if (cleanPassword.length < 8) {
          return json(
            {
              success: false,
              message: '新密码至少需要 8 个字符'
            },
            400
          );
        }

        const result = await env.DB.prepare(
          `
          UPDATE users
          SET password = ?
          WHERE username = ? AND nickname = ?
          `
        )
          .bind(
            cleanPassword,
            cleanUsername,
            cleanName
          )
          .run();

        if (!result.meta?.changes) {
          return json(
            {
              success: false,
              message: '身份信息验证失败'
            },
            404
          );
        }

        return json({
          success: true,
          message: '密码已修改'
        });
      } catch (error) {
        return json(
          {
            success: false,
            message: `密码修改失败：${error.message}`
          },
          500
        );
      }
    }

    /*
     * 5. 获取当前用户资料
     */
    if (
      url.pathname === '/api/userinfo' &&
      request.method === 'GET'
    ) {
      const token = getCookie(request, 'auth_token');

      const username = token
        ? await env.AUTH_DB.get(`session:${token}`)
        : null;

      if (username) {
        const userInfo = await env.DB.prepare(
          `
          SELECT
            username,
            nickname,
            avatar,
            email,
            bio,
            birthday,
            gender
          FROM users
          WHERE username = ?
          `
        )
          .bind(username)
          .first();

        if (userInfo) {
          return json({
            loggedIn: true,
            data: userInfo
          });
        }
      }

      return json({
        loggedIn: false
      });
    }

    /*
     * 6. 修改个人资料
     */
    if (
      url.pathname === '/api/user/update' &&
      request.method === 'POST'
    ) {
      const token = getCookie(request, 'auth_token');

      if (!token) {
        return json(
          {
            success: false,
            message: '未登录'
          },
          401
        );
      }

      const username = await env.AUTH_DB.get(
        `session:${token}`
      );

      if (!username) {
        return json(
          {
            success: false,
            message: '登录已过期'
          },
          401
        );
      }

      try {
        const body = await readJson(request);

        const current = await env.DB.prepare(
          `
          SELECT nickname, avatar, email, bio
          FROM users
          WHERE username = ?
          `
        )
          .bind(username)
          .first();

        if (!current) {
          return json(
            {
              success: false,
              message: '用户不存在'
            },
            404
          );
        }

        const finalNickname =
          body.nickname !== undefined
            ? String(body.nickname)
            : current.nickname;

        const finalAvatar =
          body.avatar !== undefined
            ? String(body.avatar)
            : current.avatar;

        const finalEmail =
          body.email !== undefined
            ? String(body.email)
            : current.email;

        const finalBio =
          body.bio !== undefined
            ? String(body.bio)
            : current.bio;

        await env.DB.prepare(
          `
          UPDATE users
          SET
            nickname = ?,
            avatar = ?,
            email = ?,
            bio = ?
          WHERE username = ?
          `
        )
          .bind(
            finalNickname,
            finalAvatar,
            finalEmail,
            finalBio,
            username
          )
          .run();

        return json({
          success: true,
          message: '资料更新成功'
        });
      } catch (error) {
        return json(
          {
            success: false,
            message: `更新失败：${error.message}`
          },
          500
        );
      }
    }

    /*
     * 7. 已登录用户修改密码
     */
    if (
      url.pathname === '/api/user/change-password' &&
      request.method === 'POST'
    ) {
      const token = getCookie(request, 'auth_token');

      if (!token) {
        return json(
          {
            success: false,
            message: '未登录'
          },
          401
        );
      }

      const username = await env.AUTH_DB.get(
        `session:${token}`
      );

      if (!username) {
        return json(
          {
            success: false,
            message: '登录已过期'
          },
          401
        );
      }

      try {
        const {
          current_password,
          new_password
        } = await readJson(request);

        const currentPassword =
          String(current_password || '');

        const newPassword =
          String(new_password || '');

        if (!currentPassword) {
          return json(
            {
              success: false,
              message: '请输入当前密码'
            },
            400
          );
        }

        if (newPassword.length < 8) {
          return json(
            {
              success: false,
              message: '新密码至少需要 8 个字符'
            },
            400
          );
        }

        const user = await env.DB.prepare(
          `
          SELECT username
          FROM users
          WHERE username = ? AND password = ?
          `
        )
          .bind(username, currentPassword)
          .first();

        if (!user) {
          return json(
            {
              success: false,
              message: '当前密码错误'
            },
            400
          );
        }

        await env.DB.prepare(
          `
          UPDATE users
          SET password = ?
          WHERE username = ?
          `
        )
          .bind(newPassword, username)
          .run();

        return json({
          success: true,
          message: '密码已成功更新'
        });
      } catch (error) {
        return json(
          {
            success: false,
            message: `密码更新失败：${error.message}`
          },
          500
        );
      }
    }

    /*
     * 8. SSO 检查
     *
     * 新域名没有 Cookie 时，先跳转到登录域名进行检查。
     */
    if (
      url.pathname === '/api/sso-check' &&
      request.method === 'GET'
    ) {
      const from = url.searchParams.get('from');
      const target = safeTarget(from, LOGIN_PAGE);

      const token = getCookie(request, 'auth_token');

      const username = token
        ? await env.AUTH_DB.get(`session:${token}`)
        : null;

      if (username) {
        target.searchParams.set('sso_token', token);

        return Response.redirect(
          target.toString(),
          302
        );
      }

      return Response.redirect(
        loginUrl(target.toString()),
        302
      );
    }

    /*
     * 9. 接收 SSO Token
     *
     * 在目标根域名下重新设置 Cookie，
     * 然后从地址栏中删除 sso_token。
     */
    const ssoToken = url.searchParams.get('sso_token');

    if (ssoToken) {
      const username = await env.AUTH_DB.get(
        `session:${ssoToken}`
      );

      if (username) {
        const cleanUrl = new URL(request.url);
        cleanUrl.searchParams.delete('sso_token');

        const ttl = 30 * 24 * 60 * 60;

        const cookie =
          `auth_token=${encodeURIComponent(ssoToken)}; ` +
          `Path=/; ` +
          `Domain=${currentDomain}; ` +
          `Max-Age=${ttl}; ` +
          `HttpOnly; ` +
          `Secure; ` +
          `SameSite=Lax`;

        return new Response(null, {
          status: 302,
          headers: {
            Location: cleanUrl.toString(),
            'Set-Cookie': cookie
          }
        });
      }
    }

    /*
     * 10. 原有登录拦截器逻辑
     */
    const token = getCookie(request, 'auth_token');

    const username = token
      ? await env.AUTH_DB.get(`session:${token}`)
      : null;

    if (!username) {
      /*
       * API 请求未登录时返回 JSON，
       * 不重定向到登录页面。
       */
      if (url.pathname.startsWith('/api/')) {
        return json(
          {
            success: false,
            message: 'Unauthorized'
          },
          401
        );
      }

      /*
       * dpdns.org 域名先通过 SSO 检查接口探测登录状态。
       */
      if (
        url.hostname === 'cyr.dpdns.org' ||
        url.hostname.endsWith('.cyr.dpdns.org')
      ) {
        return Response.redirect(
          `${LOGIN_PAGE}/api/sso-check?from=${encodeURIComponent(
            request.url
          )}`,
          302
        );
      }

      /*
       * chenyurong.qzz.io 域名直接跳转登录页。
       */
      return Response.redirect(
        loginUrl(request.url),
        302
      );
    }

    /*
     * 已登录，继续请求原始网站。
     */
    return fetch(request);
  }
};
