<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>PRTS - 干员档案管理中心</title>
    <style>
        body { background: #121212; color: #e2e2e2; font-family: sans-serif; padding: 40px; display: flex; justify-content: center; }
        .profile-card { background: #1a1a1a; border: 1px solid #333; width: 450px; padding: 30px; border-left: 4px solid #ffaa00; }
        h2 { margin-bottom: 20px; font-weight: 400; font-size: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; color: #7a7a7a; margin-bottom: 5px; text-transform: uppercase; }
        input, textarea { width: 100%; padding: 10px; background: #0b0b0b; border: 1px solid #333; color: #fff; box-sizing: border-box; }
        input:focus, textarea:focus { border-color: #ffaa00; outline: none; }
        .avatar-preview { width: 80px; height: 80px; border-radius: 50%; border: 2px solid #ffaa00; margin-bottom: 15px; background-size: cover; background-position: center; }
        button { background: #ffaa00; color: #000; border: none; padding: 12px 20px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        button:hover { background: #e09600; }
        #status-msg { margin-top: 10px; font-size: 13px; color: #ff4a4a; font-family: monospace; }
    </style>
</head>
<body>

<div class="profile-card">
    <h2>OPERATOR PROFILE // 干员档案修改</h2>
    
    <div class="avatar-preview" id="avatar-view"></div>

    <div class="form-group">
        <label>UID / 唯一账号 (不可修改)</label>
        <input type="text" id="username" disabled style="background: #222; color: #666;">
    </div>
    <div class="form-group">
        <label>NICKNAME / 干员代称</label>
        <input type="text" id="nickname">
    </div>
    <div class="form-group">
        <label>AVATAR URL / 头像图片链接</label>
        <input type="text" id="avatar" oninput="document.getElementById('avatar-view').style.backgroundImage=`url('${this.value}')`">
    </div>
    <div class="form-group">
        <label>EMAIL / 通讯邮件</label>
        <input type="text" id="email">
    </div>
    <div class="form-group">
        <label>BIO / 个人简介</label>
        <textarea id="bio" rows="3"></textarea>
    </div>

    <button onclick="saveProfile()">UPDATE PROFILE // 提交档案更新</button>
    <div id="status-msg"></div>
</div>

<script>
    // 1. 页面加载时自动获取当前最新的用户信息，填充到表单里
    async function fetchProfile() {
        const msg = document.getElementById('status-msg');
        try {
            const res = await fetch('/api/userinfo');
            const result = await res.json();
            if (result.loggedIn) {
                const user = result.data;
                document.getElementById('username').value = user.username;
                document.getElementById('nickname').value = user.nickname || user.username;
                document.getElementById('avatar').value = user.avatar;
                document.getElementById('email').value = user.email;
                document.getElementById('bio').value = user.bio;
                document.getElementById('avatar-view').style.backgroundImage = `url('${user.avatar}')`;
                msg.innerText = "";
            } else {
                msg.innerText = "[-] 错误：检测到登录凭证失效，请重新登录。";
            }
        } catch(e) {
            msg.innerText = "[-] 无法连接到本地验证服务器。";
        }
    }

    // 2. 点击按钮后，将表单数据打包发给 Worker 修改接口
    async function saveProfile() {
        const msg = document.getElementById('status-msg');
        msg.style.color = "#ffaa00";
        msg.innerText = "[*] SYNCING WITH CLOUD DATA...";

        const updateData = {
            nickname: document.getElementById('nickname').value,
            avatar: document.getElementById('avatar').value,
            email: document.getElementById('email').value,
            bio: document.getElementById('bio').value
        };

        try {
            const res = await fetch('/api/user/update', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(updateData)
            });
            const result = await res.json();
            if (result.success) {
                msg.style.color = "#00d2ff";
                msg.innerText = "[+] PROFILE UPDATED SUCCESSFUL.";
            } else {
                msg.style.color = "#ff4a4a";
                msg.innerText = "[-] UPDATE FAILED: " + result.message;
            }
        } catch(e) {
            msg.style.color = "#ff4a4a";
            msg.innerText = "[-] SERVER ERROR.";
        }
    }

    window.addEventListener('DOMContentLoaded', fetchProfile);
</script>

</body>
</html>
